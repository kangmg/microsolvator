name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # 1. Unit tests — fast, no external binaries
  # ---------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with test dependencies
        run: pip install -e ".[tests]"

      - name: Run unit tests
        run: python -m pytest tests/test_microsolvator.py tests/test_code_review_fixes.py tests/test_workflow.py -v

  # ---------------------------------------------------------------
  # 2. Integration tests — install CREST/xTB and run real QCG jobs
  # ---------------------------------------------------------------
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with test dependencies
        run: pip install -e ".[tests]"

      - name: Install CREST and xTB via microsolvator
        run: |
          python -c "
          from microsolvator import install_crest, install_xtb
          crest_path = install_crest(force=True)
          xtb_path = install_xtb(force=True)
          print(f'CREST installed: {crest_path}')
          print(f'xTB   installed: {xtb_path}')
          "

      - name: Verify CREST binary
        run: |
          python -c "
          from microsolvator import resolve_crest_binary
          crest = resolve_crest_binary(None)
          print(f'Resolved CREST: {crest}')
          " && python -c "
          from microsolvator import resolve_crest_binary
          import subprocess
          result = subprocess.run(
              [resolve_crest_binary(None), '--version'],
              capture_output=True, text=True, timeout=30,
          )
          print(result.stdout[:500])
          print(result.stderr[:500])
          "

      - name: Verify xTB binary
        run: |
          python -c "
          from microsolvator import resolve_xtb_binary
          import subprocess
          result = subprocess.run(
              [resolve_xtb_binary(None), '--version'],
              capture_output=True, text=True, timeout=30,
          )
          print(result.stdout[:500])
          print(result.stderr[:500])
          "

      - name: Run integration tests
        env:
          MICROSOLVATOR_INTEGRATION: "1"
          OMP_STACKSIZE: "4G"
          OMP_NUM_THREADS: "1,1"
          OMP_MAX_ACTIVE_LEVELS: "1"
          OPENBLAS_NUM_THREADS: "1"
        timeout-minutes: 30
        run: |
          ulimit -s unlimited
          python -m pytest tests/test_integration.py -v -s
